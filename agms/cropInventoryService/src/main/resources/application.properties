spring.application.name=cropInventoryService
server.port=8084
server.servlet.context-path=/

# ===== Config Client Import Check =====
spring.cloud.config.import-check.enabled=false

# ===== Database Setting =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cropdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Ijse@1234}

# ===== HikariCP Connection Pool Settings =====
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=MyHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ===== JPA (Hibernate) Settings =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===== Logging Configuration =====
logging.level.root=INFO
logging.level.com.agms.cropInventoryService=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# ===== Tomcat Settings =====
server.tomcat.max-connections=8192
server.tomcat.max-threads=200
server.tomcat.connection-timeout=20000ms

# ===== Spring Boot Actuator (Health Checks) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true