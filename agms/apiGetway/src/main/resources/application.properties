spring.application.name=apiGetway
server.port=8090
spring.main.allow-bean-definition-overriding=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ROUTES

# Auth Service
spring.cloud.gateway.routes[0].id=AUTHSERVICE
spring.cloud.gateway.routes[0].uri=lb://AUTHSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Automation Service
spring.cloud.gateway.routes[1].id=AUTOMATIONSERVICE
spring.cloud.gateway.routes[1].uri=lb://AUTOMATIONSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/automation/**

# Crop Inventory Service
spring.cloud.gateway.routes[2].id=CROPINVENTORYSERVICE
spring.cloud.gateway.routes[2].uri=lb://CROPINVENTORYSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/crops/**

# Telemetry Service
spring.cloud.gateway.routes[2].id=TELEMETRYSERVICE
spring.cloud.gateway.routes[2].uri=lb://TELEMETRYSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/sensors/**

# Zone Service
spring.cloud.gateway.routes[2].id=ZONESERVICE
spring.cloud.gateway.routes[2].uri=lb://ZONESERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/zones/**

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

