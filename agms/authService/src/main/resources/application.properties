spring.application.name=authService
server.port=8085

# ===== Database Setting =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/authdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Ijse@1234

# ===== Config Client Import Check =====
spring.cloud.config.import-check.enabled=false

# ===== HikariCP Connection Pool Settings =====
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=MyHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ===== JPA (Hibernate) Settings =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ===== Other Tomcat Settings (Existing and fine) =====
server.tomcat.max-connections=8192
server.tomcat.max-threads=200

